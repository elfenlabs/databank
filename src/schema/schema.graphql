scalar DateTime
scalar JSON

# --- Enums ---
enum Direction { OUTGOING INCOMING BOTH }
enum TemporalMode { AT WITHIN OVERLAPS }
enum MatchType { EXACT SEMANTIC }

# --- Inputs ---
input TemporalFilter {
  mode: TemporalMode!
  at: DateTime
  from: DateTime
  to: DateTime
}

input CreateEntityInput {
  content: String!
  labels: [String!]!
  properties: JSON
}

input UpdateEntityInput {
  content: String
  labels: [String!]
  properties: JSON
}

input CreateEdgeInput {
  sourceId: ID!
  targetId: ID!
  relationType: String!
  properties: JSON
  validFrom: DateTime
  validTo: DateTime
}

input SemanticSearch {
  query: String!
  threshold: Float!
}

input PropertyFilter {
  key: String!
  value: String!
}

# --- Entity Types ---
type Entity {
  id: ID!
  content: String!
  labels: [String!]!
  properties: JSON!
  createdAt: DateTime!
}

# --- Connection Types (Relay-style pagination) ---
type ConnectionEdge {
  entity: Entity!
  relationType: String!
  validFrom: DateTime
  validTo: DateTime
  cursor: String!
}

type ConnectionResult {
  edges: [ConnectionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type EntityEdge {
  entity: Entity!
  cursor: String!
}

type EntityResult {
  edges: [EntityEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

# --- Edge Type ---
type Edge {
  id: ID!
  sourceId: ID!
  targetId: ID!
  relationType: String!
  properties: JSON!
  validFrom: DateTime
  validTo: DateTime
  createdAt: DateTime!
}

# --- Registry Types (shared by relation keys + property keys) ---
type RegistryEntry {
  name: String!
  description: String
  usageCount: Int!
  createdAt: DateTime!
}

type RegistryEdge {
  node: RegistryEntry!
  score: Float!
  cursor: String!
}

type RegistryResult {
  edges: [RegistryEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

# --- Maintenance ---
type SimilarPair {
  entityA: Entity!
  entityB: Entity!
  similarity: Float!
}

type SchemaInfo {
  labels: [String!]!
  relationTypes: [String!]!
  propertyKeys: [String!]!
  entityCount: Int!
  edgeCount: Int!
}

# --- Queries ---
type Query {
  entities(
    search: SemanticSearch
    labels: [String!]
    properties: [PropertyFilter!]
    first: Int!
    after: String
  ): EntityResult!

  connections(
    nodeId: ID!
    relationType: String
    targetLabels: [String!]
    targetSearch: SemanticSearch
    direction: Direction = OUTGOING
    temporal: TemporalFilter
    first: Int = 10
    after: String
  ): ConnectionResult!

  relationKeys(
    match: MatchType
    value: String
    threshold: Float
    first: Int = 20
    after: String
  ): RegistryResult!

  propertyKeys(
    match: MatchType
    value: String
    threshold: Float
    first: Int = 20
    after: String
  ): RegistryResult!

  orphans(first: Int = 20, after: String): EntityResult!
  similarPairs(threshold: Float!): [SimilarPair!]!
  schema: SchemaInfo!
}

# --- Mutations ---
type Mutation {
  createEntity(input: CreateEntityInput!): Entity!
  updateEntity(id: ID!, input: UpdateEntityInput!): Entity!
  deleteEntity(id: ID!): Boolean!

  createEdge(input: CreateEdgeInput!): Edge!
  deleteEdge(id: ID!): Boolean!

  registerRelation(name: String!, description: String): RegistryEntry!
  mergeRelations(sources: [String!]!, target: String!): RegistryEntry!
  deleteRelation(name: String!): Boolean!

  registerProperty(name: String!, description: String): RegistryEntry!
  mergeProperties(sources: [String!]!, target: String!): RegistryEntry!
  deleteProperty(name: String!): Boolean!
}
