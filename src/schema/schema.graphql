"""ISO-8601 date-time string (e.g. `2026-03-01T12:00:00Z`)."""
scalar DateTime

"""Arbitrary JSON object."""
scalar JSON

"""Relay Global Object Identification — any type with a unique `id`."""
interface Node { id: ID! }

enum Direction { OUTGOING INCOMING BOTH }
enum TemporalMode { AT WITHIN OVERLAPS }
enum MatchType { EXACT SEMANTIC }

"""
Temporal filter for edge validity windows.
AT requires `at`; WITHIN and OVERLAPS require `from` + `to`.
"""
input TemporalFilter {
  mode: TemporalMode!
  at: DateTime
  from: DateTime
  to: DateTime
}

input CreateEntityInput {
  """Text content, automatically embedded for semantic search."""
  content: String!
  labels: [String!]!
  """Key-value properties stored as JSON."""
  properties: JSON
}

"""Only provided fields are changed; omitted fields are preserved."""
input UpdateEntityInput {
  content: String
  """Replaces all labels when set."""
  labels: [String!]
  """Replaces all properties when set."""
  properties: JSON
}

input CreateEdgeInput {
  sourceId: ID!
  targetId: ID!
  """Auto-registered in the relation registry if new."""
  relationType: String!
  properties: JSON
  validFrom: DateTime
  validTo: DateTime
}

"""Cosine similarity filter. Embeds the query and matches against content vectors."""
input SemanticSearch {
  query: String!
  """Minimum cosine similarity (0.0–1.0)."""
  threshold: Float!
}

"""Exact key-value match. Multiple filters are combined with AND."""
input PropertyFilter {
  key: String!
  value: String!
}

"""Knowledge entity with content, labels, and key-value properties."""
type Entity implements Node {
  id: ID!
  content: String!
  labels: [String!]!
  properties: JSON!
  createdAt: DateTime!
}

"""Directed, typed relationship between two entities with optional temporal validity."""
type Edge implements Node {
  id: ID!
  sourceId: ID!
  targetId: ID!
  relationType: String!
  properties: JSON!
  validFrom: DateTime
  validTo: DateTime
  createdAt: DateTime!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type EntityEdge {
  node: Entity!
  """Cosine similarity when `search` is active; null otherwise."""
  score: Float
  cursor: String!
}

type EntityConnection {
  edges: [EntityEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""Traversal result: adjacent entity + full edge object."""
type RelationEdge {
  node: Entity!
  """Full edge object (id, properties, temporal validity). At depth > 1, this is the last hop's edge."""
  edge: Edge!
  """Cosine similarity when `targetSearch` is active; null otherwise."""
  score: Float
  cursor: String!
}

type RelationConnection {
  edges: [RelationEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""A single step in a path between two entities."""
type PathStep {
  entity: Entity!
  """The edge traversed to reach this entity. Null for the starting entity."""
  edge: Edge
}

"""Named entry in a registry (relation types or property keys)."""
type RegistryEntry {
  name: String!
  description: String
  usageCount: Int!
  createdAt: DateTime!
}

type RegistryEdge {
  node: RegistryEntry!
  """1.0 for exact/unfiltered, cosine similarity for semantic matches."""
  score: Float!
  cursor: String!
}

type RegistryConnection {
  edges: [RegistryEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type SimilarPair {
  entityA: Entity!
  entityB: Entity!
  similarity: Float!
}

"""Aggregate statistics and vocabulary of the databank."""
type SchemaInfo {
  labels: [String!]!
  relationTypes: [String!]!
  propertyKeys: [String!]!
  entityCount: Int!
  edgeCount: Int!
}

type Query {
  """
  Search and filter entities.
  Labels filter is OR; properties filter is AND; all filters are combined with AND.
  Sorted by similarity when `search` is set, otherwise by creation time (desc).
  """
  entities(
    search: SemanticSearch
    """OR — entities with any of these labels."""
    labels: [String!]
    """AND — all key-value pairs must match."""
    properties: [PropertyFilter!]
    first: Int!
    after: String
  ): EntityConnection!

  """
  Traverse the graph from an entity, returning adjacent entities and full edge objects.
  At depth 1 (default), returns direct neighbors. At depth > 1, returns only terminal
  entities reachable in exactly N hops. `relationType` and `temporal` filter every hop;
  `targetLabels` and `targetSearch` filter only terminal entities.
  Sorted by edge creation time (desc).
  """
  relations(
    entityId: ID!
    relationType: String
    """OR — targets with any of these labels."""
    targetLabels: [String!]
    """Semantic filter on target content. Populates `score` in results."""
    targetSearch: SemanticSearch
    direction: Direction = OUTGOING
    temporal: TemporalFilter
    """Traversal depth. 1 = direct neighbors (default). Max 5."""
    depth: Int = 1
    first: Int = 10
    after: String
  ): RelationConnection!

  """
  Find the shortest path between two entities.
  Always traverses bidirectionally. Returns empty array if no path exists within maxDepth.
  """
  path(
    fromId: ID!
    toId: ID!
    """Maximum hops to search. Default 5, max 5."""
    maxDepth: Int = 5
    """Optional: only traverse edges of this relation type."""
    relationType: String
  ): [PathStep!]!

  """Browse or search relation type registry. Default sort: usage count (desc)."""
  relationKeys(
    match: MatchType
    value: String
    """Required when `match: SEMANTIC`."""
    threshold: Float
    first: Int = 20
    after: String
  ): RegistryConnection!

  """Browse the property key vocabulary. Default sort: usage count (desc)."""
  propertyKeys(
    first: Int = 20
    after: String
  ): RegistryConnection!

  """Entities with no edges. Sorted by creation time (desc)."""
  orphans(first: Int = 20, after: String): EntityConnection!

  """Entity pairs with high content similarity but no direct edge. Max 50 pairs."""
  similarPairs(threshold: Float!): [SimilarPair!]!

  schema: SchemaInfo!
}

type Mutation {
  createEntity(input: CreateEntityInput!): Entity!
  updateEntity(id: ID!, input: UpdateEntityInput!): Entity!
  """Cascades: removes associated labels and edges."""
  deleteEntity(id: ID!): Boolean!

  """Relation type is auto-registered if new."""
  createEdge(input: CreateEdgeInput!): Edge!
  deleteEdge(id: ID!): Boolean!

  registerRelation(name: String!, description: String): RegistryEntry!
  """Re-labels all edges from source types to target type."""
  mergeRelations(sources: [String!]!, target: String!): RegistryEntry!
  """Fails if edges still reference this type."""
  deleteRelation(name: String!): Boolean!

  registerProperty(name: String!, description: String): RegistryEntry!
  """Re-labels all properties from source keys to target key."""
  mergeProperties(sources: [String!]!, target: String!): RegistryEntry!
  """Fails if entities still use this key."""
  deleteProperty(name: String!): Boolean!
}
