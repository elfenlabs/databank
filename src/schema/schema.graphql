"""ISO-8601 date-time string (e.g. `2026-03-01T12:00:00Z`)."""
scalar DateTime

"""Arbitrary JSON object."""
scalar JSON

"""Relay Global Object Identification — any type with a unique `id`."""
interface Node { id: ID! }

enum Direction { OUTGOING INCOMING BOTH }
enum TemporalMode { AT WITHIN OVERLAPS }
enum MatchType { EXACT SEMANTIC }

"""
Temporal filter for edge validity windows.
AT requires `at`; WITHIN and OVERLAPS require `from` + `to`.
"""
input TemporalFilter {
  mode: TemporalMode!
  at: DateTime
  from: DateTime
  to: DateTime
}

input TraitInput {
  name: String!
  """Scoped properties — keys must be defined in the trait schema."""
  properties: JSON
}

input CreateEntityInput {
  name: String!
  """Optional rich context. Combined with name for embedding."""
  description: String
  traits: [TraitInput!]!
}

"""Only provided fields are changed; omitted fields are preserved."""
input UpdateEntityInput {
  name: String
  description: String
  """Replaces all trait assignments when set."""
  traits: [TraitInput!]
}

input CreateEdgeInput {
  sourceId: ID!
  targetId: ID!
  """Auto-registered in the relation registry if new."""
  relationType: String!
  properties: JSON
  validFrom: DateTime
  validTo: DateTime
}

"""Cosine similarity filter. Embeds the query and matches against entity embeddings."""
input SemanticSearch {
  query: String!
  """Minimum cosine similarity (0.0–1.0)."""
  threshold: Float!
}

"""Trait-scoped filter. Multiple filters are combined with AND."""
input TraitFilter {
  trait: String!
  """Optional JSONB containment match on trait properties."""
  properties: JSON
}

"""Knowledge entity with typed trait assignments."""
type Entity implements Node {
  id: ID!
  name: String!
  description: String
  traits: [EntityTrait!]!
  createdAt: DateTime!
}

"""A trait assigned to an entity, with its scoped properties."""
type EntityTrait {
  name: String!
  properties: JSON!
}

"""Directed, typed relationship between two entities with optional temporal validity."""
type Edge implements Node {
  id: ID!
  sourceId: ID!
  targetId: ID!
  relationType: String!
  properties: JSON!
  validFrom: DateTime
  validTo: DateTime
  createdAt: DateTime!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type EntityEdge {
  node: Entity!
  """Cosine similarity when `search` is active; null otherwise."""
  score: Float
  cursor: String!
}

type EntityConnection {
  edges: [EntityEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""Traversal result: adjacent entity + full edge object."""
type RelationEdge {
  node: Entity!
  """Full edge object (id, properties, temporal validity). At depth > 1, this is the last hop's edge."""
  edge: Edge!
  """Cosine similarity when `targetSearch` is active; null otherwise."""
  score: Float
  cursor: String!
}

type RelationConnection {
  edges: [RelationEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""A single step in a path between two entities."""
type PathStep {
  entity: Entity!
  """The edge traversed to reach this entity. Null for the starting entity."""
  edge: Edge
}

"""Named entry in the relation registry."""
type RegistryEntry {
  name: String!
  description: String
  usageCount: Int!
  createdAt: DateTime!
}

type RegistryEdge {
  node: RegistryEntry!
  """1.0 for exact/unfiltered, cosine similarity for semantic matches."""
  score: Float!
  cursor: String!
}

type RegistryConnection {
  edges: [RegistryEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""Registered trait definition with its property schema."""
type Trait {
  name: String!
  description: String
  propertyKeys: [String!]!
  usageCount: Int!
  createdAt: DateTime!
}

type TraitEdge {
  node: Trait!
  """1.0 for exact/unfiltered, cosine similarity for semantic matches."""
  score: Float!
  cursor: String!
}

type TraitConnection {
  edges: [TraitEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

type SimilarPair {
  entityA: Entity!
  entityB: Entity!
  similarity: Float!
}

"""An observation in the memory stream (WAL). Embedded on write for vector search."""
type MemoryStreamEntry implements Node {
  id: ID!
  content: String!
  source: String!
  priority: Int!
  status: String!
  createdAt: DateTime!
  processedAt: DateTime
}

type MemoryStreamEdge {
  node: MemoryStreamEntry!
  """Cosine similarity when `search` is active; null otherwise."""
  score: Float
  cursor: String!
}

type MemoryStreamConnection {
  edges: [MemoryStreamEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""Aggregate statistics and vocabulary of the databank."""
type SchemaInfo {
  traits: [String!]!
  relationTypes: [String!]!
  entityCount: Int!
  edgeCount: Int!
  memoryStreamCount: Int!
}

type Query {
  """
  Search and filter entities.
  Trait filter is AND across filters; all filters are combined with AND.
  Sorted by similarity when `search` is set, otherwise by creation time (desc).
  """
  entities(
    search: SemanticSearch
    """AND — all trait filters must match."""
    traitFilter: [TraitFilter!]
    first: Int!
    after: String
  ): EntityConnection!

  """
  Traverse the graph from an entity, returning adjacent entities and full edge objects.
  At depth 1 (default), returns direct neighbors. At depth > 1, returns only terminal
  entities reachable in exactly N hops. `relationType` and `temporal` filter every hop;
  `targetTraits` and `targetSearch` filter only terminal entities.
  Sorted by edge creation time (desc).
  """
  relations(
    entityId: ID!
    relationType: String
    """OR — targets with any of these traits."""
    targetTraits: [String!]
    """Semantic filter on target entities. Populates `score` in results."""
    targetSearch: SemanticSearch
    direction: Direction = OUTGOING
    temporal: TemporalFilter
    """Traversal depth. 1 = direct neighbors (default). Max 5."""
    depth: Int = 1
    first: Int = 10
    after: String
  ): RelationConnection!

  """
  Find the shortest path between two entities.
  Always traverses bidirectionally. Returns empty array if no path exists within maxDepth.
  """
  path(
    fromId: ID!
    toId: ID!
    """Maximum hops to search. Default 5, max 5."""
    maxDepth: Int = 5
    """Optional: only traverse edges of this relation type."""
    relationType: String
  ): [PathStep!]!

  """Browse or search relation type registry. Default sort: usage count (desc)."""
  relationKeys(
    match: MatchType
    value: String
    """Required when `match: SEMANTIC`."""
    threshold: Float
    first: Int = 20
    after: String
  ): RegistryConnection!

  """Browse or search trait registry. Default sort: usage count (desc)."""
  traits(
    match: MatchType
    value: String
    """Required when `match: SEMANTIC`."""
    threshold: Float
    first: Int = 20
    after: String
  ): TraitConnection!

  """Entities with no edges. Sorted by creation time (desc)."""
  orphans(first: Int = 20, after: String): EntityConnection!

  """Entity pairs with high embedding similarity but no direct edge. Max 50 pairs."""
  similarPairs(threshold: Float!): [SimilarPair!]!

  """
  Browse or search the memory stream.
  Sorted by similarity when `search` is set, otherwise by creation time (desc).
  """
  memoryStream(
    search: SemanticSearch
    """Filter by status (e.g. PENDING, PROCESSED). Omit to show all."""
    status: String
    first: Int = 20
    after: String
  ): MemoryStreamConnection!

  schema: SchemaInfo!
}

type Mutation {
  createEntity(input: CreateEntityInput!): Entity!
  updateEntity(id: ID!, input: UpdateEntityInput!): Entity!
  """Cascades: removes associated trait assignments and edges."""
  deleteEntity(id: ID!): Boolean!

  """Relation type is auto-registered if new."""
  createEdge(input: CreateEdgeInput!): Edge!
  deleteEdge(id: ID!): Boolean!

  registerRelation(name: String!, description: String): RegistryEntry!
  """Re-labels all edges from source types to target type."""
  mergeRelations(sources: [String!]!, target: String!): RegistryEntry!
  """Fails if edges still reference this type."""
  deleteRelation(name: String!): Boolean!

  """Register a trait with optional property key definitions."""
  registerTrait(name: String!, description: String, propertyKeys: [String!]): Trait!
  """Re-labels all entity trait assignments from source traits to target trait."""
  mergeTraits(sources: [String!]!, target: String!): Trait!
  """Fails if entities still carry this trait."""
  deleteTrait(name: String!): Boolean!

  """Add a property key to an existing trait's schema."""
  addTraitProperty(trait: String!, key: String!, description: String): Trait!
  """Remove a property key from a trait's schema. Does not strip the key from existing entities."""
  removeTraitProperty(trait: String!, key: String!): Trait!

  """Append an observation to the memory stream. Embedded on write."""
  appendMemory(content: String!, source: String!, priority: Int): MemoryStreamEntry!
  """Mark entries as PROCESSED or DISCARDED. Used by the Librarian."""
  updateMemoryStatus(ids: [ID!]!, status: String!): Int!
  """Truncate non-PENDING entries older than the given timestamp."""
  truncateMemoryStream(before: DateTime!): Int!
}
