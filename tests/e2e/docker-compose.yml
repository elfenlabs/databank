# Ephemeral test infra — no named volumes, non-conflicting ports.
# Usage: docker compose -f tests/e2e/docker-compose.yml up -d --wait

services:
  thesauros:
    build:
      context: ../..
      dockerfile: infra/thesauros/Dockerfile
    environment:
      EMBED_URL: http://embedder:8100
      PORT: "4000"
    ports:
      - "14000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4000/graphql -o /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    depends_on:
      embedder:
        condition: service_healthy

  embedder:
    build:
      context: ../../infra/embedder
    environment:
      EMBED_MODEL: BAAI/bge-small-en-v1.5
    ports:
      - "18100:8100"
    volumes:
      - hf_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/docs')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s

volumes:
  hf_cache:
    external: true
    name: local_hf_cache
